upstream api_upstream {
    server api:4000;
}

upstream app_upstream {
    server app:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limiting for auth endpoints — 10 req/s burst, max 30
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Don't advertise nginx version in error pages or Server header
    server_tokens off;

    client_max_body_size 200M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS — uncomment once TLS is terminated at this layer (not upstream Cloudflare/Tailscale)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Camera stream proxy ───────────────────────────────────────────────────
    # MJPEG and snapshot streams are infinite / long-lived — disable buffering
    # and extend the read timeout so nginx doesn't cut off the feed.
    location ~ ^/api/printers/[^/]+/camera/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 15s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    location /api/auth/ {
        # Nginx-level rate limit on login/signup — defence-in-depth on top of NestJS throttler
        limit_req zone=auth_limit burst=30 nodelay;

        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://app_upstream/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
